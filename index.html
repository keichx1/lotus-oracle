<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="theme-color" content="#1A3D2B" />
  <title>คุณคือบัวอะไร</title>
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    /* ── Local Fonts ── */
    @font-face {
      font-family: 'Charmonman';
      src: url('assets/font/Charmonman-Bold.ttf') format('truetype');
      font-weight: 700;
      font-display: swap;
    }
    @font-face {
      font-family: 'BaiJamjuree';
      src: url('assets/font/BaiJamjuree-Regular.ttf') format('truetype');
      font-weight: 400;
      font-display: swap;
    }
    @font-face {
      font-family: 'KalieBLuxury';
      src: url('assets/font/kaliebluxury-regular.ttf') format('truetype');
      font-weight: 400;
      font-display: swap;
    }

    /* ── Reset ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── Base ── */
    html, body {
      width: 100%; height: 100%;
      font-family: 'Noto Sans Thai', sans-serif;
      background-color: #F5F0E8;
      color: #1C1C1C;
      overflow-x: hidden;
    }

    body {
      background-image: url('assets/Texture.jpg');
      background-size: cover;
      background-attachment: fixed;
      background-position: center;
      background-repeat: no-repeat;
      min-height: 100vh;
    }

    /* ── App shell ── */
    #app {
      position: relative;
      width: 100%;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ── Pages ── */
    .page {
      position: absolute;
      inset: 0;
      width: 100%;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 28px;
      opacity: 0;
      pointer-events: none;
      transform: translateY(24px);
      transition: opacity 0.55s cubic-bezier(0.4,0,0.2,1),
                  transform 0.55s cubic-bezier(0.4,0,0.2,1);
      will-change: opacity, transform;
    }
    .page.active {
      opacity: 1;
      pointer-events: all;
      transform: translateY(0);
      position: relative;
    }
    .page.exit {
      opacity: 0;
      transform: translateY(-24px);
      pointer-events: none;
    }

    /* ══ LANDING PAGE ══ */
    #landing-page {
      gap: 28px;
      max-width: 420px;
      margin: 0 auto;
    }

    .landing-title {
      font-family: 'Charmonman', serif;
      font-size: clamp(1.4rem, 5.5vw, 1.9rem);
      font-weight: 700;
      color: #1A3D2B;
      text-align: center;
      line-height: 1.3;
      letter-spacing: 0.02em;
    }

    .landing-card-wrapper {
      width: 100%;
      max-width: 240px;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 8px 40px rgba(0,0,0,0.18);
      flex-shrink: 0;
    }
    .landing-card-wrapper img {
      width: 100%;
      display: block;
    }

    .landing-quote {
      font-family: 'BaiJamjuree', sans-serif;
      font-size: 0.88rem;
      color: #5A5A5A;
      text-align: center;
      line-height: 1.75;
      font-style: italic;
      max-width: 300px;
    }

    /* ══ PREDICTION PAGE ══ */
    #prediction-page {
      max-width: 420px;
      margin: 0 auto;
      padding: 52px 28px 40px;
      justify-content: flex-start;
      gap: 0;
    }

    /* Header group — centered on page, centered inside */
    .prediction-header-group {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
      max-width: 420px;
    }

    /* Large English title */
    .prediction-en-title {
      font-family: 'KalieBLuxury', serif;
      font-size: clamp(2rem, 9vw, 3.4rem);
      font-weight: 400;
      color: #1A3D2B;
      text-align: center;
      line-height: 1.0;
      letter-spacing: -0.01em;
      white-space: nowrap;
      margin-bottom: 0;
      width: 100%;
      opacity: 0;
      transform: translateY(24px);
      transition: opacity 0.65s cubic-bezier(0.4,0,0.2,1) 0.05s,
                  transform 0.65s cubic-bezier(0.4,0,0.2,1) 0.05s;
    }
    #prediction-page.active .prediction-en-title {
      opacity: 1; transform: translateY(0);
    }

    /* Lotus PNG image */
    .prediction-image-wrapper {
      width: 100%;
      display: flex;
      justify-content: center;
      margin-top: -40px;
      margin-bottom: 16px;
      opacity: 0;
      transform: scale(0.94) translateY(20px);
      transition: opacity 0.75s cubic-bezier(0.4,0,0.2,1) 0.15s,
                  transform 0.75s cubic-bezier(0.4,0,0.2,1) 0.15s;
    }
    #prediction-page.active .prediction-image-wrapper {
      opacity: 1; transform: scale(1) translateY(0);
    }
    .prediction-image-wrapper img {
      width: 100%;
      max-width: 340px;
      object-fit: contain;
    }

    /* Thai lotus name */
    .prediction-lotus-name {
      font-family: 'Charmonman', serif;
      font-size: clamp(1.7rem, 6.5vw, 2.1rem);
      font-weight: 700;
      color: #1A3D2B;
      text-align: center;
      margin-bottom: 12px;
      letter-spacing: 0.01em;
      opacity: 0;
      transform: translateY(16px);
      transition: opacity 0.6s cubic-bezier(0.4,0,0.2,1) 0.3s,
                  transform 0.6s cubic-bezier(0.4,0,0.2,1) 0.3s;
    }
    #prediction-page.active .prediction-lotus-name {
      opacity: 1; transform: translateY(0);
    }

    /* Description */
    .prediction-description {
      font-family: 'BaiJamjuree', sans-serif;
      font-size: 0.9rem;
      color: #5A5A5A;
      text-align: center;
      line-height: 1.85;
      margin-bottom: 32px;
      max-width: 340px;
      opacity: 0;
      transform: translateY(12px);
      transition: opacity 0.6s cubic-bezier(0.4,0,0.2,1) 0.42s,
                  transform 0.6s cubic-bezier(0.4,0,0.2,1) 0.42s;
    }
    #prediction-page.active .prediction-description {
      opacity: 1; transform: translateY(0);
    }

    /* ══ BUTTONS ══ */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-family: 'Noto Sans Thai', sans-serif;
      font-size: 1rem;
      font-weight: 500;
      padding: 14px 24px;
      transition: background 0.2s ease, transform 0.15s ease, box-shadow 0.2s ease;
      text-decoration: none;
      letter-spacing: 0.02em;
      -webkit-tap-highlight-color: transparent;
    }
    .btn:active { transform: scale(0.97); }

    .btn-primary {
      background: #2A5C3F;
      color: #fff;
      width: 100%;
      box-shadow: 0 2px 12px rgba(42,92,63,0.28);
    }
    .btn-primary:hover { background: #1A3D2B; box-shadow: 0 4px 20px rgba(42,92,63,0.38); }

    .btn-secondary {
      background: transparent;
      color: #2A5C3F;
      border: 1.5px solid #2A5C3F;
      flex: 1;
    }
    .btn-secondary:hover { background: rgba(42,92,63,0.07); }

    .btn-save {
      background: #2A5C3F;
      color: #fff;
      flex: 1;
      box-shadow: 0 2px 12px rgba(42,92,63,0.22);
    }
    .btn-save:hover { background: #1A3D2B; box-shadow: 0 4px 20px rgba(42,92,63,0.32); }

    .btn svg { width: 18px; height: 18px; flex-shrink: 0; }

    /* Button row */
    .btn-row {
      display: flex;
      gap: 12px;
      width: 100%;
      opacity: 0;
      transform: translateY(12px);
      transition: opacity 0.6s cubic-bezier(0.4,0,0.2,1) 0.54s,
                  transform 0.6s cubic-bezier(0.4,0,0.2,1) 0.54s;
    }
    #prediction-page.active .btn-row { opacity: 1; transform: translateY(0); }

    /* ══ Responsive ══ */
    @media (max-width: 390px) {
      .prediction-en-title { font-size: clamp(1.6rem, 8vw, 2rem); }
      .btn { font-size: 0.9rem; padding: 13px 18px; }
    }
  </style>
</head>
<body>

<div id="app">

  <!-- ══ LANDING PAGE ══ -->
  <section id="landing-page" class="page" role="main">

    <h1 class="landing-title">คุณคือบัวอะไร</h1>

    <div class="landing-card-wrapper">
      <img
        src="assets/back-card.png"
        alt="Lotus Oracle Card"
        onerror="this.style.display='none'"
      />
    </div>

    <p class="landing-quote">
      "ดั่งสระน้ำที่สงบนิ่ง... ให้บัวที่คู่ควรกับคุณ ได้ผุดพ้นขึ้นเหนือน้ำ"
    </p>

    <button id="open-btn" class="btn btn-primary" type="button">
      เปิดใจให้บัวบาน
    </button>

  </section>


  <!-- ══ PREDICTION PAGE ══ -->
  <section id="prediction-page" class="page" role="main" aria-live="polite">

    <div class="prediction-header-group">
      <h2 class="prediction-en-title" id="pred-en-title"></h2>

      <div class="prediction-image-wrapper">
        <img id="pred-image" src="" alt="ดอกบัว" />
      </div>
    </div>

    <p class="prediction-lotus-name" id="pred-name"></p>

    <p class="prediction-description" id="pred-description"></p>

    <div class="btn-row">
      <button id="save-btn" class="btn btn-save" type="button">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="7 10 12 15 17 10"/>
          <line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
        บันทึกรูป
      </button>
      <button id="retry-btn" class="btn btn-secondary" type="button">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <polyline points="23 4 23 10 17 10"/>
          <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
        </svg>
        ลองอีกครั้ง
      </button>
    </div>

  </section>

</div><!-- /app -->

<script>
'use strict';

const LOTUS_DATA = [
  {
    id: 'royal-pink',
    enTitle: 'The Royal Pink',
    name: 'ดอกบัวปทุมชาติ',
    image: 'assets/royal-pink.png',
    shareImage: 'assets/sharing-cards/royal-pink-share.png',
    description: 'คุณมีจิตวิญญาณที่สง่างามและอ่อนโยน เปี่ยมด้วยความรักและความเมตตา ดั่งบัวปทุมชาติที่ผลิบานอย่างงดงาม คุณนำความอบอุ่นและความสุขมาสู่ผู้คนรอบข้างเสมอ',
  },
  {
    id: 'radiant-gomen',
    enTitle: 'The Radiant Gomen',
    name: 'ดอกบัวโกเมน',
    image: 'assets/radiant-gomen.png',
    shareImage: 'assets/sharing-cards/radiant-gomen-share.png',
    description: 'คุณเป็นผู้มีพลังและความมุ่งมั่นอันแรงกล้า สีแดงเข้มของบัวโกเมนสะท้อนถึงหัวใจที่กล้าหาญและเต็มเปี่ยมด้วยความหลงใหล คุณไม่เคยยอมแพ้ต่ออุปสรรคใดๆ',
  },
  {
    id: 'midnight-bloom',
    enTitle: 'The Midnight Bloom',
    name: 'ดอกบัวเศวตอุบล',
    image: 'assets/midnight-bloom.png',
    shareImage: 'assets/sharing-cards/midnight-bloom-share.png',
    description: 'คุณมีความลึกซึ้งและปัญญาที่น่าทึ่ง เหมือนดังบัวขาวที่บริสุทธิ์บนผิวน้ำ คุณมองเห็นความจริงที่ซ่อนอยู่และนำทางผู้อื่นด้วยความชัดเจนและสงบนิ่ง',
  },
  {
    id: 'mystic-azure',
    enTitle: 'The Mystic Azure',
    name: 'ดอกบัวฉลองขวัญ',
    image: 'assets/mystic-azure.png',
    shareImage: 'assets/sharing-cards/mystic-azure-share.png',
    description: 'คุณมีจิตวิญญาณของศิลปินที่เต็มไปด้วยความคิดสร้างสรรค์และมุมมองที่เฉียบคมไม่ซ้ำใคร สีม่วงอันลึกลับสะท้อนถึงโลกส่วนตัวที่น่าค้นหา คุณมีสัญชาตญาณที่แม่นยำและไม่ชอบถูกจำกัดอยู่ในกรอบ',
  },
  {
    id: 'eternal-petal',
    enTitle: 'The Eternal Petal',
    name: 'ดอกบัวจงกลนี',
    image: 'assets/eternal-petal.png',
    shareImage: 'assets/sharing-cards/eternal-petal-share.png',
    description: 'คุณเป็นผู้ที่มีความอดทนและความสม่ำเสมออันยาวนาน เหมือนดังบัวจงกลนีที่ผลิบานอยู่เสมอ คุณเป็นเสาหลักให้กับผู้คนรอบข้างและสร้างแรงบันดาลใจให้ทุกคน',
  },
  {
    id: 'golden-wisdom',
    enTitle: 'The Golden Wisdom',
    name: 'ดอกบัวมณีสยาม',
    image: 'assets/golden-wisdom.png',
    shareImage: 'assets/sharing-cards/golden-wisdom-share.png',
    description: 'คุณมีปัญญาและความเฉลียวฉลาดที่ส่องสว่างดั่งทองคำ บัวมณีสยามสะท้อนถึงความโดดเด่นของคุณ คุณเป็นแสงนำทางให้ผู้อื่นก้าวข้ามความมืดและพบกับความจริงอันงดงาม',
  },
];

let currentLotus = null;
let isTransitioning = false;

const landingPage    = document.getElementById('landing-page');
const predictionPage = document.getElementById('prediction-page');
const predImg        = document.getElementById('pred-image');
const predName       = document.getElementById('pred-name');
const predDesc       = document.getElementById('pred-description');
const predEnTitle    = document.getElementById('pred-en-title');

function getRandomLotus(exclude) {
  const arr = new Uint32Array(1);
  const pool = exclude ? LOTUS_DATA.filter(l => l.id !== exclude.id) : LOTUS_DATA;
  window.crypto.getRandomValues(arr);
  return pool[arr[0] % pool.length];
}

function transitionTo(showEl, hideEl, populate) {
  if (isTransitioning) return;
  isTransitioning = true;
  hideEl.classList.remove('active');
  hideEl.classList.add('exit');
  setTimeout(() => {
    hideEl.classList.remove('exit');
    if (populate) populate();
    showEl.classList.remove('active');   // reset so animations re-fire
    void showEl.offsetWidth;             // force reflow
    showEl.classList.add('active');
    setTimeout(() => { isTransitioning = false; }, 800);
  }, 420);
}

function applyLotus(lotus) {
  predEnTitle.textContent = lotus.enTitle;
  predName.textContent    = lotus.name;
  predDesc.textContent    = lotus.description;
  predImg.src             = lotus.image;
  predImg.alt             = lotus.name;
}

function runPrediction() {
  currentLotus = getRandomLotus(null);
  const img = new Image();
  const go = () => transitionTo(predictionPage, landingPage, () => applyLotus(currentLotus));
  img.onload = img.onerror = go;
  img.src = currentLotus.image;
}

function goHome() {
  transitionTo(landingPage, predictionPage, null);
  currentLotus = null;
}

function saveImage() {
  if (!currentLotus) return;
  const shareUrl = currentLotus.shareImage;
  const filename = currentLotus.id + '-share.png';
  const img = new Image();
  img.crossOrigin = 'anonymous';
  img.onload = () => {
    try {
      const canvas = document.createElement('canvas');
      canvas.width = img.naturalWidth || 1080;
      canvas.height = img.naturalHeight || 1080;
      canvas.getContext('2d').drawImage(img, 0, 0);
      triggerDownload(canvas.toDataURL('image/png'), filename);
    } catch { triggerDownload(shareUrl, filename); }
  };
  img.onerror = () => triggerDownload(shareUrl, filename);
  img.src = shareUrl;
}

function triggerDownload(href, filename) {
  const a = document.createElement('a');
  a.href = href; a.download = filename;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
}

document.getElementById('open-btn').addEventListener('click', runPrediction);
document.getElementById('retry-btn').addEventListener('click', goHome);
document.getElementById('save-btn').addEventListener('click', saveImage);

landingPage.classList.add('active');
</script>
</body>
</html>
